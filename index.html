<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Feliz Cumpleaños Majo</title>
  <style>
    body {
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;      /* Centra horizontalmente */
      justify-content: center;  /* Centra verticalmente */
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    h1 {
      font-size: 4.5em;         /* Texto más grande */
      color: #e63946;
      margin: 20px 0;
      text-align: center;       /* Centra el texto */
      animation: aparecer 2s ease-in-out forwards;
      z-index: 2;
    }

    .imagen {
      width: 500px;             /* Imagen más grande */
      height: auto;
      opacity: 0;
      animation: dibujar 4s ease-in-out forwards;
      z-index: 2;
      display: block;
      margin: 0 auto;           /* Centra la imagen */
    }

    /* Animaciones */
    @keyframes aparecer {
      from { opacity: 0; transform: translateY(-50px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes dibujar {
      from { opacity: 0; transform: scale(0.5); }
      to { opacity: 1; transform: scale(1); }
    }

    /* Confeti */
    .confeti {
      position: absolute;
      width: 10px;
      height: 10px;
      background-color: red;
      animation: caer 5s linear infinite;
    }

    @keyframes caer {
      from { transform: translateY(-100vh); }
      to { transform: translateY(100vh); }
    }
  </style>
</head>
<body>
  <h1>¡Feliz Cumpleaños Majo!</h1>
  <img src="Spiderman.png" alt="Spider-Man Pixel Art" class="imagen">

  <!-- Confeti generado -->
  <script>
    for (let i = 0; i < 100; i++) {
      let confeti = document.createElement("div");
      confeti.className = "confeti";
      confeti.style.left = Math.random() * 100 + "vw";
      confeti.style.backgroundColor = ["red","blue","green","yellow","purple"][Math.floor(Math.random()*5)];
      confeti.style.animationDuration = (Math.random() * 3 + 2) + "s";
      document.body.appendChild(confeti);
    }
  </script>
</body>
</html>
